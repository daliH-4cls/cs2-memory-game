<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Memory</h1>
    <p>Click to flip and match cards</p>

    <div class="row">
        <div id="card1" class="card" onclick="flipCard('card1')">Strawberry</div>
        <div id="card2" class="card" onclick="flipCard('card2')">Orange</div>
        <div id="card3" class="card" onclick="flipCard('card3')">Lemon</div>
        <div id="card4" class="card" onclick="flipCard('card4')">Cherry</div>
    </div>

    <div class="row">
        <div id="card5" class="card" onclick="flipCard('card5')">Lemon</div>
        <div id="card6" class="card" onclick="flipCard('card6')">Cherry</div>
        <div id="card7" class="card" onclick="flipCard('card7')">Orange</div>
        <div id="card8" class="card" onclick="flipCard('card8')">Strawberry</div>
    </div>

    <h2 id="guess-display">Guesses: 0</h2>

    <script src="script.js"></script>
</body>
</html>
